name: Build Windows EXE Prerelease

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: Otzaria AI
  EXECUTABLE_NAME: OtzariaAI
  APP_VERSION: 0.1.0
  PUBLISHER: Ariel Daniely
  BUNDLE_ID: com.arieldaniely.otzariaai

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: OtzariaAI-prerelease-${{ github.run_number }}-windows.zip
            build_target: windows
            package_kind: zip
          - os: macos-latest
            artifact_name: OtzariaAI-prerelease-${{ github.run_number }}-macos.zip
            build_target: macos
            package_kind: zip
          - os: ubuntu-latest
            artifact_name: OtzariaAI-prerelease-${{ github.run_number }}-linux.tar.gz
            build_target: linux
            package_kind: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install Linux GUI build dependencies
        if: matrix.build_target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0 libgtk-3-0

      - name: Generate macOS icon bundle
        if: matrix.build_target == 'macos'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          import subprocess
          from PIL import Image

          root = Path("static")
          source = root / "icon.ico"
          iconset = root / "icon.iconset"
          icns = root / "icon.icns"

          if iconset.exists():
              shutil.rmtree(iconset)
          iconset.mkdir(exist_ok=True)

          base = Image.open(source).convert("RGBA")
          sizes = [16, 32, 64, 128, 256, 512, 1024]
          for size in sizes:
              out = iconset / f"icon_{size}x{size}.png"
              base.resize((size, size)).save(out)
              if size <= 512:
                  retina = iconset / f"icon_{size//2}x{size//2}@2x.png"
                  base.resize((size, size)).save(retina)

          subprocess.run(["iconutil", "-c", "icns", str(iconset), "-o", str(icns)], check=True)
          shutil.rmtree(iconset)
          PY

      - name: Build desktop app
        shell: bash
        run: |
          ICON_ARG=""
          DATA_SEP=":"
          EXTRA_ARGS=()
          if [ "${{ matrix.build_target }}" = "windows" ]; then
            ICON_ARG="--icon static/icon.ico"
            DATA_SEP=";"
            EXTRA_ARGS+=(--version-file version_info.txt)
          elif [ "${{ matrix.build_target }}" = "macos" ] && [ -f "static/icon.icns" ]; then
            ICON_ARG="--icon static/icon.icns"
            EXTRA_ARGS+=(--osx-bundle-identifier "${{ env.BUNDLE_ID }}")
          fi

          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name "${{ env.EXECUTABLE_NAME }}" \
            --hidden-import "PySide6.QtWebEngineCore" \
            --hidden-import "PySide6.QtWebEngineWidgets" \
            --add-data "static${DATA_SEP}static" \
            --add-data "models_zips${DATA_SEP}models_zips" \
            --add-data "app_ai.html${DATA_SEP}." \
            $ICON_ARG \
            "${EXTRA_ARGS[@]}" \
            app_ai_desktop.py

      - name: Package zip build
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          $archive = "${{ matrix.artifact_name }}"
          if ("${{ matrix.build_target }}" -eq "macos") {
            Compress-Archive -Path "dist/${{ env.EXECUTABLE_NAME }}.app" -DestinationPath $archive -Force
          } else {
            Compress-Archive -Path "dist/${{ env.EXECUTABLE_NAME }}/*" -DestinationPath $archive -Force
          }
          "ARCHIVE_NAME=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Linux build
        if: matrix.package_kind == 'tar.gz'
        shell: bash
        run: |
          archive="${{ matrix.artifact_name }}"
          tar -czf "$archive" -C dist "${{ env.EXECUTABLE_NAME }}"
          echo "ARCHIVE_NAME=$archive" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Flatten asset files
        shell: bash
        run: |
          mkdir -p release_bundle
          find release_assets -type f -maxdepth 2 -exec cp {} release_bundle/ \;

      - name: Create Hebrew release notes
        shell: bash
        run: |
          cat > release_notes.md <<'EOF'
          גרסת ניסוי חדשה של אוצריא AI.

          מה כלול במהדורה:
          - יישום שולחני מעודכן ל-Windows
          - בניית ניסיון ל-macOS
          - בניית ניסיון ל-Linux

          פרטי הגרסה:
          - גרסה: ${{ env.APP_VERSION }}
          - מו"ל: ${{ env.PUBLISHER }}
          - מספר Build: ${{ github.run_number }}
          - קומיט: `${{ github.sha }}`

          הערה:
          - זו מהדורת ניסוי מוקדמת. ייתכנו הבדלים בין הפלטפורמות.
          EOF

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-experimental.${{ github.run_number }}
          name: אוצריא AI ${{ env.APP_VERSION }} ניסיוני #${{ github.run_number }}
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          body_path: release_notes.md
          files: release_bundle/*
