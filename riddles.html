<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל חידות היגיון</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 {
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .riddle-box {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.3s ease;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>מחולל חידות היגיון</h1>
        <div class="riddle-box" id="riddle-text">לחץ על הכפתור כדי לקבל חידה!</div>
        <button onclick="generateRiddle()">חידה חדשה</button>
    </div>

    <script>
        const riddles = [
            "אני תמיד רעב, חייב תמיד לאכול. האצבע שלי אדומה והנשימה שלי שחורה. מי אני? (אש)",
            "ככל שתיקח ממני יותר, כך אהיה גדול יותר. מה אני? (בור)",
            "יש לי ערים אבל אין בהן בתים. יש לי הרים אבל אין בהם עצים. יש לי מים אבל אין בהם דגים. מה אני? (מפה)",
            "מה שייך לך, אבל אנשים אחרים משתמשים בו הרבה יותר ממך? (השם שלך)",
            "אני קל כמו נוצה, אבל אפילו האיש החזק בעולם לא יכול להחזיק אותי יותר מחמש דקות. מה אני? (נשימה)"
        ];

        function generateRiddle() {
            const riddleText = document.getElementById('riddle-text');
            const randomIndex = Math.floor(Math.random() * riddles.length);
            // אפקט הבהוב קטן בעת החלפת טקסט
            riddleText.style.opacity = '0';
            setTimeout(() => {
                riddleText.textContent = riddles[randomIndex];
                riddleText.style.opacity = '1';
            }, 300); // ממתינים 300 מילישניות (בדיוק זמן האנימציה) לפני שינוי הטקסט והחזרתו
        }
    </script>
</body>
</html>
